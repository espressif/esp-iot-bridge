version: "1.2.0-dev"
description: A smart bridge to make both ESP and the other MCU or smart device can access the Internet
url: https://github.com/espressif/esp-iot-bridge/tree/master/components/iot_bridge
repository: https://github.com/espressif/esp-iot-bridge.git
documentation:
  https://github.com/espressif/esp-iot-bridge/blob/master/components/iot_bridge/User_Guide.md
issues: https://github.com/espressif/esp-iot-bridge/issues
dependencies:
  idf: '>=5.2'
  espressif/cmake_utilities: 0.*
  espressif/esp_modem:
    version: 1.*
    rules:
    - if: target not in [esp32s2, esp32s3]
  espressif/esp_modem_usb_dte:
    version: 1.*
    rules:
    - if: target in [esp32s2, esp32s3]
  espressif/esp_tinyusb:
    version: 1.*
    rules:
    - if: target in [esp32s2, esp32s3]
    - if: idf_version >=5.1.4
  espressif/ethernet_init:
    matches:
    - if: idf_version >=6.0
      version: ^1.3.0
  espressif/ch390:
    matches:
    - if: idf_version >=6.0
      version: '*'
    rules:
    - if: $CONFIG{ETHERNET_SPI_USE_CH390} == 1
  espressif/dm9051:
    matches:
    - if: idf_version >=6.0
      version: ^1.0.0
    rules:
    - if: $CONFIG{ETHERNET_SPI_USE_DM9051} == 1
  espressif/dp83848:
    matches:
    - if: idf_version >=6.0
      version: ^1.0.0
    rules:
    - if: target in [esp32, esp32p4]
    - if: $CONFIG{ETHERNET_PHY_USE_DP83848} == 1
  espressif/enc28j60:
    matches:
    - if: idf_version >=6.0
      version: '*'
    rules:
    - if: $CONFIG{ETHERNET_SPI_USE_ENC28J60} == 1
  espressif/ip101:
    matches:
    - if: idf_version >=6.0
      version: ^1.0.0
    rules:
    - if: target in [esp32, esp32p4]
    - if: $CONFIG{ETHERNET_PHY_USE_IP101} == 1
  espressif/ksz80xx:
    matches:
    - if: idf_version >=6.0
      version: ^1.0.0
    rules:
    - if: target in [esp32, esp32p4]
    - if: $CONFIG{ETHERNET_PHY_USE_KSZ80XX} == 1
  espressif/ksz8851snl:
    matches:
    - if: idf_version >=6.0
      version: ^1.0.0
    rules:
    - if: $CONFIG{ETHERNET_SPI_USE_KSZ8851SNL} == 1
  espressif/lan865x:
    matches:
    - if: idf_version >=6.0
      version: ^0.1.1
    rules:
    - if: $CONFIG{ETHERNET_SPI_USE_LAN865X} == 1
  espressif/lan867x:
    matches:
    - if: idf_version >=6.0
      version: '>=2.0.0'
    rules:
    - if: target in [esp32, esp32p4]
    - if: $CONFIG{ETHERNET_PHY_USE_LAN867X} == 1
  espressif/lan87xx:
    matches:
    - if: idf_version >=6.0
      version: ^1.0.0
    rules:
    - if: target in [esp32, esp32p4]
    - if: $CONFIG{ETHERNET_PHY_USE_LAN87XX} == 1
  espressif/rtl8201:
    matches:
    - if: idf_version >=6.0
      version: ^1.0.0
    rules:
    - if: target in [esp32, esp32p4]
    - if: $CONFIG{ETHERNET_PHY_USE_RTL8201} == 1
  espressif/w5500:
    matches:
    - if: idf_version >=6.0
      version: ^1.0.0
    rules:
    - if: $CONFIG{ETHERNET_SPI_USE_W5500} == 1
examples:
- path: ../../examples/wifi_router
- path: ../../examples/wireless_nic
- path: ../../examples/wired_nic
- path: ../../examples/4g_hotspot
- path: ../../examples/4g_nic
